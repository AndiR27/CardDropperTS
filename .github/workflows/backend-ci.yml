name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'Backend_CardDropper/**'
  pull_request:
    branches: [main]
    paths:
      - 'Backend_CardDropper/**'

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: Backend_CardDropper
        run: ./mvnw test --no-transfer-progress
