name: Spring Boot & Angular CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: Backend_CardDropper
        run: ./mvnw test --no-transfer-progress

  frontend:
    name: Frontend — production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Frontend_CardDropper/package-lock.json

      - name: Install dependencies
        working-directory: Frontend_CardDropper
        run: npm ci

      - name: Build
        working-directory: Frontend_CardDropper
        run: npx ng build --configuration production
