server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 10m;

  # Proxy API requests to Spring Boot backend (strips /api prefix)
  location /api/ {
    proxy_pass http://carddropper-backend:8080/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Forward the proto set by Traefik, not nginx's own scheme (which is always http)
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

    # WebSocket support (STOMP over WS)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Keep WebSocket / SSE connections alive (nginx default is 60s)
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # Disable buffering for SSE (live-feed)
    proxy_buffering off;
  }

  # Angular SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
