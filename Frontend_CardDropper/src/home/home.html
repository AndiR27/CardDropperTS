<div style="padding: 2rem; font-family: sans-serif;">
  <h1>CardDropper</h1>

  <!-- Statut d'authentification -->
  @if (auth.isAuthenticated) {
    <p>Connecte en tant que : <strong>{{ auth.username }}</strong></p>
    <button (click)="logout()">Se deconnecter</button>
    <button (click)="testApi()" style="margin-left: 0.5rem;">Tester GET /auth/me</button>
  } @else {
    <p>Non connecte.</p>
    <button (click)="login()">Se connecter via Keycloak</button>
  }

  <!-- Resultat de l'appel API -->
  @if (meResult()) {
    <h3>Reponse /auth/me :</h3>
    <pre style="background: #f4f4f4; padding: 1rem; border-radius: 4px;">{{ meResult() }}</pre>
  }

  @if (error()) {
    <p style="color: red;">{{ error() }}</p>
  }
</div>
