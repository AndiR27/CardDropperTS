<!-- Search bar -->
<div class="cl__search-wrap">
  <svg class="cl__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/>
  </svg>
  <input class="cl__search" type="text" placeholder="Rechercher par nom..."
         [value]="search()"
         (input)="search.set($any($event.target).value)"/>
</div>

<!-- Card grid -->
<div class="cl__grid">
  @for (card of filteredCards(); track card.id) {
    <div class="cl__card" [class.cl__card--clickable]="clickable()" (click)="clickable() && cardClick.emit(card)">
      <div class="cl__card-visual">
        @if (getImageUrl(card); as imgUrl) {
          <img [src]="imgUrl" [alt]="card.name"
               class="cl__card-img cl__card-img--{{ card.rarity | lowercase }}"/>
        } @else {
          <div class="cl__card-placeholder">?</div>
        }
        @if (getCount(card) > 1) {
          <span class="cl__qty">×{{ getCount(card) }}</span>
        }
        @if (!card.active) {
          <span class="cl__inactive-badge">Inactive</span>
        }
      </div>
      <span class="cl__card-name">{{ card.name }}</span>
      <span class="cl__badge cl__badge--{{ card.rarity | lowercase }}">{{ card.rarity }}</span>
    </div>
  } @empty {
    <p class="cl__empty">Aucune carte trouvée</p>
  }
</div>
