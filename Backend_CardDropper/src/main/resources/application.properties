spring.application.name=Backend_CardDropper

#Bdd
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/CardDropper}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:create-drop}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

#Logging

logging.level.root=${LOG_LEVEL:INFO}
#logging.pattern.console=%d{HH:mm:ss} %highlight(%-5level) [%logger{2}] %msg%n
logging.level.org.hibernate=WARN
logging.level.org.apache.camel=WARN

#doc openapi
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/v3/api-docs