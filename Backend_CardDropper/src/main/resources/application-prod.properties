# ============================
# Production profile overrides
# ============================

# Flyway schema only, no seed data
spring.flyway.locations=classpath:db/migration,classpath:db/prod
spring.flyway.clean-disabled=true

# Hibernate validate only, Flyway handles schema
spring.jpa.hibernate.ddl-auto=validate

# Disable Swagger/OpenAPI in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# HikariCP connection pool — default is 10, raised for concurrent pack openings
spring.datasource.hikari.maximum-pool-size=20
